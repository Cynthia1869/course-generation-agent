default_provider: deepseek

providers:
  deepseek:
    api_base_env: DEEPSEEK_BASE_URL
    api_key_env: DEEPSEEK_API_KEY
    base_url: https://api.deepseek.com

profiles:
  chat:
    provider: deepseek
    model: deepseek-chat
    temperature: 0.4
  clarify:
    provider: deepseek
    model: deepseek-chat
    temperature: 0.2
  extract:
    provider: deepseek
    model: deepseek-chat
    temperature: 0.0
  generate:
    provider: deepseek
    model: deepseek-reasoner
    temperature: 0.3
  review:
    provider: deepseek
    model: deepseek-reasoner
    temperature: 0.1
  improve:
    provider: deepseek
    model: deepseek-reasoner
    temperature: 0.3
